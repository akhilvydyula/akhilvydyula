<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160" role="img" aria-label="Speech bubble">
  <defs>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#1a2f4d"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#0467DF" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="500" height="120" rx="20" fill="url(#bubble)" stroke="#0467DF" stroke-width="2" filter="url(#glow)"/>
  <polygon points="40,128 70,152 90,128" fill="#1a2f4d" stroke="#0467DF" stroke-width="2"/>
  <circle cx="36" cy="36" r="8" fill="#34A853">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="56" y="40" fill="#6ea8fe" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600">AKHIL AGENT</text>
  <text x="24" y="72" fill="#ffffff" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="600">Hello! Welcome to my GitHub.</text>
  <text x="24" y="100" fill="#b8d4ff" font-family="Segoe UI, system-ui, sans-serif" font-size="14">I'm Akhil  I ship data &amp; AI to production.</text>
</svg>
