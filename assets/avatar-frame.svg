<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="Avatar frame">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0467DF"/>
      <stop offset="50%" stop-color="#0082FB"/>
      <stop offset="100%" stop-color="#E50914"/>
    </linearGradient>
    <filter id="pulse">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#0082FB" flood-opacity="0.6">
        <animate attributeName="flood-opacity" values="0.35;0.75;0.35" dur="2s" repeatCount="indefinite"/>
      </feDropShadow>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="6" filter="url(#pulse)"/>
  <circle cx="100" cy="100" r="88" fill="#0a0a0a"/>
  <image href="https://github.com/akhilvydyula.png" x="16" y="16" width="168" height="168" clip-path="url(#clip)" preserveAspectRatio="xMidYMid slice"/>
  <clipPath id="clip"><circle cx="100" cy="100" r="84"/></clipPath>
  <circle cx="158" cy="42" r="14" fill="#34A853" stroke="#0a0a0a" stroke-width="3"/>
  <circle cx="158" cy="42" r="6" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
